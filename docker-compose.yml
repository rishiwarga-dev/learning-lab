services:
  my-first-server:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - C:\Users\rishi\learning-lab\my-website:/usr/share/nginx/html
    restart: unless-stopped
  database:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
volumes:
  postgres-data: